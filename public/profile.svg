<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#10131c"/>
      <stop offset="1" stop-color="#06070a"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d83ff"/>
      <stop offset="0.6" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#5a3aff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1024" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7c5cff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g opacity="0.06" stroke="#7c5cff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>
  <!-- outer ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#ring)" stroke-width="2"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="#7c5cff" stroke-width="1" stroke-opacity="0.15"/>

  <!-- The "Q" letterform: ring + tail -->
  <g transform="translate(512 512)">
    <!-- Outer ring (the Q) -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="url(#mark)" stroke-width="60"/>
    <!-- Tail crossing the bottom-right of the Q -->
    <rect x="130" y="130" width="200" height="50" rx="8" fill="url(#mark)" transform="rotate(45 230 155)"/>
  </g>

  <!-- Accent: mint dot above the Q (like a target hit) -->
  <circle cx="730" cy="200" r="28" fill="#5eead4"/>
  <circle cx="730" cy="200" r="48" fill="none" stroke="#5eead4" stroke-width="2" stroke-opacity="0.3"/>
</svg>
